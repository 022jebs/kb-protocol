<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KB Protocol</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,300&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0a0a;--surface:#141414;--card:#1c1c1c;--border:#2a2a2a;--accent:#e8ff47;--accent2:#47ffd4;--accent3:#ff6b47;--muted:#555;--text:#e8e8e8;--text2:#999}
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow:hidden}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;display:flex;flex-direction:column}
nav{display:flex;border-bottom:1px solid var(--border);flex-shrink:0;background:var(--surface)}
.nav-btn{flex:1;padding:14px 8px;background:none;border:none;color:var(--muted);font-family:'DM Sans',sans-serif;font-size:11px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;cursor:pointer;border-bottom:2px solid transparent;transition:all .2s}
.nav-btn.active{color:var(--accent);border-bottom-color:var(--accent)}
.nav-btn:hover:not(.active){color:var(--text2)}
main{flex:1;overflow-y:auto;overflow-x:hidden}
.screen{display:none;padding:20px;max-width:600px;margin:0 auto}
.screen.active{display:block}
.screen-title{font-family:'Bebas Neue',sans-serif;font-size:42px;letter-spacing:3px;color:var(--accent);line-height:1;margin-bottom:4px}
.screen-sub{font-size:12px;color:var(--muted);font-family:'DM Mono',monospace;letter-spacing:1px;margin-bottom:24px}
.badge{display:inline-block;padding:3px 10px;border-radius:4px;font-size:11px;font-family:'DM Mono',monospace;font-weight:500;letter-spacing:1px}
.badge-L{background:rgba(71,255,212,.12);color:var(--accent2);border:1px solid rgba(71,255,212,.25)}
.badge-H{background:rgba(255,107,71,.12);color:var(--accent3);border:1px solid rgba(255,107,71,.25)}

/* PROGRESSION BANNER */
.prog-banner{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:16px;margin-bottom:20px}
.prog-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px}
.prog-step-label{font-family:'DM Mono',monospace;font-size:10px;color:var(--muted);letter-spacing:1px;text-transform:uppercase;margin-bottom:4px}
.prog-step-val{font-family:'Bebas Neue',sans-serif;font-size:26px;letter-spacing:2px;color:var(--accent);line-height:1}
.prog-weights{font-size:11px;color:var(--text2);font-family:'DM Mono',monospace;margin-top:5px;line-height:1.6}
.prog-actions{display:flex;flex-direction:column;gap:6px;align-items:flex-end}
.prog-btn{padding:7px 14px;background:none;border:1px solid var(--border);color:var(--text2);border-radius:6px;font-size:11px;font-family:'DM Mono',monospace;cursor:pointer;transition:all .2s;letter-spacing:1px;white-space:nowrap}
.prog-btn.up{border-color:var(--accent);color:var(--accent)}
.prog-btn:hover{border-color:var(--text)}
.prog-btn.up:hover{background:var(--accent);color:#000}
.prog-bar-wrap{background:var(--surface);border-radius:4px;height:4px;overflow:hidden}
.prog-bar{height:100%;background:linear-gradient(90deg,var(--accent2),var(--accent));border-radius:4px;transition:width .4s}
.prog-bar-label{display:flex;justify-content:space-between;font-size:10px;font-family:'DM Mono',monospace;color:var(--muted);margin-top:5px}

/* DAY CARDS */
.day-card{background:var(--card);border:1px solid var(--border);border-radius:12px;margin-bottom:10px;overflow:hidden;cursor:pointer;transition:border-color .2s}
.day-card:hover{border-color:var(--muted)}
.day-card.today{border-color:var(--accent)}
.day-header{display:flex;align-items:center;gap:12px;padding:14px 16px}
.day-name{font-family:'Bebas Neue',sans-serif;font-size:28px;letter-spacing:2px;width:36px;flex-shrink:0}
.day-type{flex:1}
.day-type-label{font-size:13px;font-weight:600;margin-bottom:4px}
.day-exercises{font-size:11px;color:var(--text2);font-family:'DM Mono',monospace;line-height:1.7}
.day-chevron{color:var(--muted);font-size:18px;transition:transform .2s;flex-shrink:0}
.day-card.open .day-chevron{transform:rotate(180deg)}
.day-detail{display:none;padding:0 16px 16px;border-top:1px solid var(--border)}
.day-detail.open{display:block}
.ex-row{display:flex;align-items:flex-start;padding:11px 0;border-bottom:1px solid var(--border)}
.ex-row:last-child{border-bottom:none}
.ex-name{font-size:13px;font-weight:600;margin-bottom:3px}
.ex-detail{font-size:11px;color:var(--text2);font-family:'DM Mono',monospace;line-height:1.6}
.ex-note{font-size:11px;color:var(--muted);margin-top:4px;font-style:italic;line-height:1.4}
.start-btn{width:100%;margin-top:14px;padding:13px;background:var(--accent);color:#000;border:none;border-radius:8px;font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:2px;cursor:pointer;transition:opacity .2s}
.start-btn:hover{opacity:.85}

/* TIMER */
.timer-wrap{display:flex;flex-direction:column;align-items:center;padding:10px 0}
.timer-ex-info{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:14px 16px;width:100%;margin-bottom:16px}
.timer-ex-name{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:2px;color:var(--accent);margin-bottom:4px}
.timer-ex-sub{font-size:12px;color:var(--text2);font-family:'DM Mono',monospace}
.timer-phase{font-family:'DM Mono',monospace;font-size:13px;letter-spacing:3px;text-transform:uppercase;margin-bottom:12px}
.timer-phase.work{color:var(--accent)}
.timer-phase.rest{color:var(--accent2)}
.timer-phase.ready{color:var(--muted)}
.timer-phase.done{color:var(--accent2)}
.timer-circle{position:relative;width:200px;height:200px;margin-bottom:20px}
.timer-svg{transform:rotate(-90deg)}
.timer-track{fill:none;stroke:var(--border);stroke-width:8}
.timer-prog{fill:none;stroke-width:8;stroke-linecap:round;transition:stroke-dashoffset .9s linear,stroke .3s}
.timer-center{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center}
.timer-time{font-family:'Bebas Neue',sans-serif;font-size:56px;letter-spacing:2px;line-height:1}
.timer-round{font-size:12px;color:var(--muted);font-family:'DM Mono',monospace;margin-top:4px}
.timer-controls{display:flex;gap:10px;margin-bottom:20px}
.t-btn{padding:10px 22px;border-radius:8px;border:1px solid var(--border);background:var(--card);color:var(--text);font-family:'Bebas Neue',sans-serif;font-size:16px;letter-spacing:2px;cursor:pointer;transition:all .2s}
.t-btn.primary{background:var(--accent);color:#000;border-color:var(--accent)}
.t-btn:hover:not(.primary){border-color:var(--text2)}
.t-btn.primary:hover{opacity:.85}
.timer-settings{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:16px;width:100%}
.settings-title{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:2px;color:var(--muted);text-transform:uppercase;margin-bottom:14px}
.setting-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.setting-row:last-child{margin-bottom:0}
.setting-label{font-size:13px;font-weight:500}
.setting-controls{display:flex;align-items:center;gap:8px}
.s-btn{width:28px;height:28px;border-radius:6px;border:1px solid var(--border);background:var(--surface);color:var(--text);font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:border-color .2s}
.s-btn:hover{border-color:var(--accent)}
.s-val{font-family:'DM Mono',monospace;font-size:14px;width:50px;text-align:center;color:var(--accent)}

/* CALENDAR */
.cal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.cal-month{font-family:'Bebas Neue',sans-serif;font-size:28px;letter-spacing:3px;color:var(--accent)}
.cal-nav{background:none;border:1px solid var(--border);color:var(--text);border-radius:6px;width:32px;height:32px;cursor:pointer;font-size:16px;transition:border-color .2s}
.cal-nav:hover{border-color:var(--accent)}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;margin-bottom:16px}
.cal-dow{text-align:center;font-family:'DM Mono',monospace;font-size:10px;color:var(--muted);padding:4px 0;letter-spacing:1px}
.cal-day{aspect-ratio:1;display:flex;flex-direction:column;align-items:center;justify-content:center;border-radius:6px;font-size:12px;font-family:'DM Mono',monospace;cursor:pointer;border:1px solid transparent;transition:all .15s;gap:2px}
.cal-day.other{color:var(--border);pointer-events:none}
.cal-day.today{border-color:var(--accent);color:var(--accent)}
.cal-day.done{background:rgba(71,255,212,.1);border-color:rgba(71,255,212,.3);color:var(--accent2)}
.cal-day.skipped{background:rgba(255,107,71,.08);border-color:rgba(255,107,71,.2);color:var(--accent3)}
.cal-day:not(.other):hover{border-color:var(--muted)}
.cal-dot{width:4px;height:4px;border-radius:50%}
.cal-day.done .cal-dot{background:var(--accent2)}
.cal-day.skipped .cal-dot{background:var(--accent3)}
.cal-day.train:not(.done):not(.skipped) .cal-dot{background:var(--border)}
.cal-legend{display:flex;gap:14px;margin-bottom:20px;flex-wrap:wrap}
.cal-legend-item{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--text2);font-family:'DM Mono',monospace}
.cal-legend-dot{width:8px;height:8px;border-radius:50%}
.stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:20px}
.stat-card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:14px}
.stat-val{font-family:'Bebas Neue',sans-serif;font-size:32px;color:var(--accent);letter-spacing:2px}
.stat-label{font-size:10px;color:var(--muted);font-family:'DM Mono',monospace;letter-spacing:1px;text-transform:uppercase;margin-top:2px}
.history-item{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:12px 14px;margin-bottom:8px;display:flex;align-items:center;gap:12px}
.history-date{font-family:'DM Mono',monospace;font-size:11px;color:var(--muted);width:68px;flex-shrink:0}
.history-info{flex:1}
.history-title{font-size:13px;font-weight:600;margin-bottom:2px}
.history-sub{font-size:11px;color:var(--text2);font-family:'DM Mono',monospace}
.history-status{font-size:11px;font-family:'DM Mono',monospace;font-weight:600}
.status-done{color:var(--accent2)}
.status-skip{color:var(--accent3)}
.empty-state{text-align:center;padding:40px 0;color:var(--muted);font-family:'DM Mono',monospace;font-size:12px;letter-spacing:1px;line-height:2.2}

/* MODALS */
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:100;align-items:flex-end;justify-content:center}
.modal-bg.open{display:flex}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:16px 16px 0 0;padding:24px 20px;width:100%;max-width:600px;max-height:85vh;overflow-y:auto;position:relative}
.modal-title{font-family:'Bebas Neue',sans-serif;font-size:24px;letter-spacing:2px;margin-bottom:4px}
.modal-sub{font-size:12px;color:var(--muted);font-family:'DM Mono',monospace;margin-bottom:20px}
.modal-btn{width:100%;padding:13px;border-radius:8px;border:none;font-family:'Bebas Neue',sans-serif;font-size:16px;letter-spacing:2px;cursor:pointer;margin-bottom:8px;transition:opacity .2s}
.modal-btn:hover{opacity:.85}
.modal-btn.primary{background:var(--accent2);color:#000}
.modal-btn.secondary{background:var(--card);color:var(--text);border:1px solid var(--border)}
.modal-btn.danger{background:var(--accent3);color:#fff}
.modal-close{position:absolute;top:16px;right:20px;background:none;border:none;color:var(--muted);font-size:24px;cursor:pointer}

/* STEP LIST */
.step-list{display:flex;flex-direction:column;gap:6px;margin-bottom:16px}
.step-item{display:flex;align-items:center;gap:12px;padding:12px 14px;border-radius:8px;border:1px solid var(--border);background:var(--card);cursor:pointer;transition:all .2s}
.step-item:hover{border-color:var(--text2)}
.step-item.active{border-color:var(--accent);background:rgba(232,255,71,.04)}
.step-num{font-family:'Bebas Neue',sans-serif;font-size:22px;color:var(--muted);width:26px;flex-shrink:0;text-align:center}
.step-item.active .step-num{color:var(--accent)}
.step-info{flex:1}
.step-title{font-size:13px;font-weight:600;margin-bottom:2px}
.step-detail{font-size:11px;color:var(--text2);font-family:'DM Mono',monospace}
.step-sep{font-family:'DM Mono',monospace;font-size:10px;color:var(--muted);letter-spacing:2px;text-transform:uppercase;padding:8px 4px 4px;border-top:1px solid var(--border);margin-top:4px}
.kb-manager{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:14px;margin-bottom:16px}
.kb-manager-title{font-family:'DM Mono',monospace;font-size:10px;color:var(--muted);letter-spacing:2px;text-transform:uppercase;margin-bottom:10px}
.kb-grid{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px}
.kb-chip{padding:6px 12px;border-radius:6px;border:1px solid var(--border);background:var(--card);color:var(--muted);font-family:'DM Mono',monospace;font-size:12px;cursor:pointer;transition:all .2s;letter-spacing:1px}
.kb-chip.owned{border-color:var(--accent);color:var(--accent);background:rgba(232,255,71,.08)}
.kb-suggest{margin-top:8px;padding:10px 12px;background:rgba(71,255,212,.06);border:1px solid rgba(71,255,212,.2);border-radius:8px;font-size:12px;color:var(--accent2);font-family:'DM Mono',monospace;line-height:1.6}
.rpe-row{margin-bottom:14px}
.rpe-label{font-size:12px;font-weight:600;margin-bottom:8px}
.rpe-label span{font-family:'DM Mono',monospace;font-size:10px;color:var(--muted);margin-left:6px}
.rpe-btns{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px}
.rpe-btn{padding:10px 6px;border-radius:8px;border:1px solid var(--border);background:var(--card);color:var(--text2);font-family:'DM Mono',monospace;font-size:11px;cursor:pointer;transition:all .2s;text-align:center;line-height:1.4}
.rpe-btn:hover{border-color:var(--text2)}
.rpe-btn.sel-easy{border-color:var(--accent2);background:rgba(71,255,212,.1);color:var(--accent2)}
.rpe-btn.sel-good{border-color:var(--accent);background:rgba(232,255,71,.08);color:var(--accent)}
.rpe-btn.sel-hard{border-color:var(--accent3);background:rgba(255,107,71,.08);color:var(--accent3)}
.suggestion-card{border-radius:10px;padding:14px 16px;margin-bottom:12px;border:2px solid}
.sug-up{background:rgba(71,255,212,.06);border-color:rgba(71,255,212,.3)}
.sug-stay{background:rgba(232,255,71,.04);border-color:rgba(232,255,71,.2)}
.sug-down{background:rgba(255,107,71,.06);border-color:rgba(255,107,71,.3)}
.sug-title{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:2px;margin-bottom:4px}
.sug-detail{font-size:12px;color:var(--muted);font-family:'DM Mono',monospace;line-height:1.6;margin-bottom:12px}

.chart-wrap{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:16px;margin-bottom:12px}
.chart-title{font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:2px;margin-bottom:4px}
.chart-sub{font-size:11px;color:var(--muted);font-family:'DM Mono',monospace;letter-spacing:1px;margin-bottom:14px}
.chart-tabs{display:flex;gap:6px;margin-bottom:14px;flex-wrap:wrap}
.chart-tab{padding:5px 12px;border-radius:5px;border:1px solid var(--border);background:none;color:var(--muted);font-family:'DM Mono',monospace;font-size:11px;cursor:pointer;transition:all .2s;letter-spacing:1px}
.chart-tab.active{border-color:var(--accent);color:var(--accent);background:rgba(232,255,71,.06)}
.chart-canvas-wrap{position:relative;width:100%;height:160px}
.chart-empty{text-align:center;padding:40px 0;color:var(--muted);font-family:'DM Mono',monospace;font-size:11px;letter-spacing:1px}
.chart-legend{display:flex;gap:14px;margin-top:10px;flex-wrap:wrap}
.chart-legend-item{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--text2);font-family:'DM Mono',monospace}
.chart-legend-dot{width:8px;height:8px;border-radius:50%}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
</style>
</head>
<body>

<nav>
  <button class="nav-btn active" onclick="showScreen('plan')">PLAN</button>
  <button class="nav-btn" onclick="showScreen('timer')">TIMER</button>
  <button class="nav-btn" onclick="showScreen('calendar')">KALENDARZ</button>
</nav>

<main>
<div id="screen-plan" class="screen active"></div>

<div id="screen-timer" class="screen">
  <div class="screen-title">TIMER</div>
  <div class="screen-sub">INTERWAŁOWY</div>
  <div class="timer-wrap">
    <div id="timer-ex-info" class="timer-ex-info" style="display:none">
      <div id="timer-ex-name" class="timer-ex-name"></div>
      <div id="timer-ex-sub" class="timer-ex-sub"></div>
    </div>
    <div class="timer-phase ready" id="timer-phase">GOTOWY</div>
    <div class="timer-circle">
      <svg class="timer-svg" viewBox="0 0 200 200" width="200" height="200">
        <circle class="timer-track" cx="100" cy="100" r="88"/>
        <circle class="timer-prog" id="timer-prog" cx="100" cy="100" r="88"
          stroke-dasharray="553" stroke-dashoffset="0" stroke="var(--accent)"/>
      </svg>
      <div class="timer-center">
        <div class="timer-time" id="timer-display">60</div>
        <div class="timer-round" id="timer-round-info">RUNDA 1</div>
      </div>
    </div>
    <div class="timer-controls">
      <button class="t-btn" onclick="resetTimer()">RESET</button>
      <button class="t-btn primary" id="timer-toggle-btn" onclick="toggleTimer()">START</button>
      <button class="t-btn" onclick="skipPhase()">SKIP</button>
    </div>
    <div class="timer-settings">
      <div class="settings-title">Ustawienia timera</div>
      <div class="setting-row">
        <span class="setting-label">Praca</span>
        <div class="setting-controls">
          <button class="s-btn" onclick="adjustSetting('work',-5)">−</button>
          <span class="s-val" id="work-val">60s</span>
          <button class="s-btn" onclick="adjustSetting('work',5)">+</button>
        </div>
      </div>
      <div class="setting-row">
        <span class="setting-label">Odpoczynek</span>
        <div class="setting-controls">
          <button class="s-btn" onclick="adjustSetting('rest',-5)">−</button>
          <span class="s-val" id="rest-val">30s</span>
          <button class="s-btn" onclick="adjustSetting('rest',5)">+</button>
        </div>
      </div>
      <div class="setting-row">
        <span class="setting-label">Rundy</span>
        <div class="setting-controls">
          <button class="s-btn" onclick="adjustSetting('rounds',-1)">−</button>
          <span class="s-val" id="rounds-val">4</span>
          <button class="s-btn" onclick="adjustSetting('rounds',1)">+</button>
        </div>
      </div>
    </div>
  </div>
</div>

<div id="screen-calendar" class="screen"></div>
</main>

<!-- MODAL: log session -->
<div class="modal-bg" id="modal-log">
  <div class="modal">
    <button class="modal-close" onclick="closeModal('modal-log')">×</button>
    <div class="modal-title" id="modal-log-title"></div>
    <div class="modal-sub" id="modal-log-sub"></div>
    <button class="modal-btn primary" id="modal-log-done" onclick="toggleSession('done')">✓ WYKONANE</button>
    <button class="modal-btn danger" id="modal-log-skipped" onclick="toggleSession('skipped')">✗ POMINIĘTE</button>
  </div>
</div>


<!-- MODAL: ankieta RPE -->
<div class="modal-bg" id="modal-rpe">
  <div class="modal">
    <button class="modal-close" onclick="closeModal('modal-rpe')">×</button>
    <div class="modal-title">JAK BYŁO?</div>
    <div class="modal-sub" id="rpe-modal-sub">Oceń każde ćwiczenie</div>
    <div id="rpe-questions"></div>
    <button class="modal-btn primary" id="rpe-submit-btn" onclick="submitRPE()" style="margin-top:8px">ZAPISZ OCENĘ</button>
    <button class="modal-btn secondary" onclick="closeModal('modal-rpe')">POMIŃ</button>
  </div>
</div>

<!-- MODAL: sugestia progresji -->
<div class="modal-bg" id="modal-suggestion">
  <div class="modal">
    <button class="modal-close" onclick="closeModal('modal-suggestion')">×</button>
    <div class="modal-title">PODSUMOWANIE TYGODNIA</div>
    <div class="modal-sub">Na podstawie Twoich ocen z tego tygodnia</div>
    <div id="suggestion-content"></div>
    <button class="modal-btn secondary" style="margin-top:8px" onclick="closeModal('modal-suggestion')">ZAMKNIJ</button>
  </div>
</div>

<!-- MODAL: exercise override -->
<div class="modal-bg" id="modal-override">
  <div class="modal">
    <button class="modal-close" onclick="closeModal('modal-override')">×</button>
    <div class="modal-title" id="override-title">USTAW KROK</div>
    <div class="modal-sub" id="override-sub">Wybierz krok dla tego ćwiczenia</div>
    <div id="override-list" class="step-list"></div>

// Pobierz lub wylosuj mobility dla danego tygodnia
// weekKey = "YYYY-WW" (rok + numer tygodnia ISO)
function getISOWeek(date) {
  const d = new Date(date);
  d.setHours(0,0,0,0);
  d.setDate(d.getDate() + 3 - (d.getDay()+6)%7);
  const w1 = new Date(d.getFullYear(),0,4);
  return d.getFullYear() + '-W' + String(1+Math.round(((d-w1)/86400000-3+(w1.getDay()+6)%7)/7)).padStart(2,'0');
}

function getMobilityForWeek(weekKey) {
  const stored = JSON.parse(localStorage.getItem('kb_mobility') || '{}');
  if (stored[weekKey]) return stored[weekKey];

  // Losuj 3 różne filmy: wed, sat (z pełnej puli), sun (z łagodnych)
  // wed i sat nie mogą być takie same
  const allIds = MOBILITY_ALL.map(v=>v.id);
  const easyIds = MOBILITY_EASY;

  // Pobierz ostatnio użyty (z poprzedniego tygodnia) żeby nie powtarzać
  const prevWeeks = Object.keys(stored).sort();
  const prevKey = prevWeeks[prevWeeks.length-1];
  const prevUsed = prevKey ? [stored[prevKey].wed, stored[prevKey].sat, stored[prevKey].sun] : [];

  function pickRandom(pool, exclude=[]) {
    const avail = pool.filter(id => !exclude.includes(id));
    const src = avail.length > 0 ? avail : pool;
    return src[Math.floor(Math.random() * src.length)];
  }

  const wed = pickRandom(allIds, prevUsed);
  const sat = pickRandom(allIds, [...prevUsed, wed]);
  const sun = pickRandom(easyIds, [wed, sat]);

  const week = { wed, sat, sun };
  stored[weekKey] = week;
  localStorage.setItem('kb_mobility', JSON.stringify(stored));
  return week;
}

function getMobilityVideo(dayKey) {
  const today = new Date();
  const weekKey = getISOWeek(today);
  const week = getMobilityForWeek(weekKey);
  const id = week[dayKey];
  return MOBILITY_ALL.find(v => v.id === id) || null;
}

function setOverride(exKey, stepNum) {
  state.overrides[exKey] = stepNum - 1; // store 0-based index

}

function resetOverride() {
  if (pendingOverrideKey) {

}

// All available KB weights in the app
const ALL_KBS = [4,6,8,10,12,14,16,20,24,28,32];

function getOwnedKBs() {
  return state.ownedKBs || [4,6,8,12,16];
}

function toggleKB(kg) {
  const owned = getOwnedKBs();
  const idx = owned.indexOf(kg);
  if (idx >= 0) state.ownedKBs = owned.filter(w => w !== kg);
  else state.ownedKBs = [...owned, kg].sort((a,b)=>a-b);
  saveState();
  renderPlan();
}

// Find the best matching step given owned KBs
function suggestNextStep() {
  const owned = getOwnedKBs();
  const cur = curStep();
  // Find first step beyond current where both L and H are owned
  for (let i = state.step; i < STEPS.length; i++) {
    const st = STEPS[i];
    if (owned.includes(st.L) && owned.includes(st.H) &&
        owned.includes(st.SL) && owned.includes(st.SH)) {
      if (st.step > cur.step) return st;
    }
  }
  return null;
}

// Check if current step weights are all owned
function currentStepOwned() {
  const owned = getOwnedKBs();
  const s = curStep();
  return owned.includes(s.L) && owned.includes(s.H) &&
         owned.includes(s.SL) && owned.includes(s.SH);
}

function curStep() { return STEPS[Math.min(state.step,STEPS.length)-1]; }

// Get step for a specific exercise (uses override if set, else global)
function exStep(exKey) {
  const ov = state.overrides[exKey];
  if (ov !== undefined) return STEPS[Math.min(ov, STEPS.length)-1];
  return curStep();
}

// exKey: 'swing','squat','cp','tgu'
function kg(w, isSquat, exKey) {
  const s = exKey ? exStep(exKey) : curStep();
  if (isSquat) return w==='L' ? s.SL : s.SH;
  return w==='L' ? s.L : s.H;
}
function approxMin(rounds) { return Math.round(rounds*90/60); }

function getExKey(ex) {
  if (ex.name.includes('Swing')) return 'swing';
  if (ex.name.includes('Squat')) return 'squat';
  if (ex.name.includes('Clean')) return 'cp';
  if (ex.name.includes('Turkish')) return 'tgu';
  return null;
}

function getExRounds(ex) {
  const key = getExKey(ex);
  const s = key ? exStep(key) : curStep();
  return ex.fmt === 'tgu' ? s.tguSets : s.intRounds;
}

        cooldownLinks = '<div style="display:flex;gap:8px;margin-top:8px;flex-wrap:wrap">' +
          cd.links.map(c =>

          ).join('') + '</div>';

      const ovBtn = exKey ? `<button onclick="event.stopPropagation();openOverrideModal('${exKey}')"
        style="margin-top:8px;padding:5px 10px;background:none;border:1px solid ${hasOv?'var(--accent3)':'var(--border)'};
        color:${hasOv?'var(--accent3)':'var(--muted)'};border-radius:5px;font-size:10px;font-family:'DM Mono',monospace;
        cursor:pointer;letter-spacing:1px">${hasOv?'★ ZMIEŃ KROK':'USTAW KROK'}</button>` : '';

      exRows += `<div class="ex-row">
        <div style="width:100%">
          <div class="ex-name">${ex.name}${ex.w ? ` <span class="badge badge-${ex.w}">${ex.w}</span>` : ''}</div>
          <div class="ex-detail">${detail}</div>
          ${ex.note ? `<div class="ex-note">${ex.note}</div>` : ''}
          ${ovBtn}

      </div>`;
    });

    html += `<div class="day-card${todayCls}" id="card-${day.key}" onclick="toggleDay('${day.key}')">
      <div class="day-header">
        <div class="day-name">${day.name}</div>
        <div class="day-type">
          <div class="day-type-label">${day.label}</div>
          <div class="day-exercises">${exSummary}</div>
        </div>
        <div class="day-chevron">▾</div>

      <div class="day-detail" id="detail-${day.key}">
        ${exRows}
        <button class="start-btn" onclick="event.stopPropagation();launchTimer('${day.key}')">▶ START TIMER</button>

  });

  document.getElementById('screen-plan').innerHTML = html;
}

function toggleDay(key) {
  const detail = document.getElementById('detail-'+key);
  const card = document.getElementById('card-'+key);

  document.querySelectorAll('.day-detail').forEach(d=>d.classList.remove('open'));

function nextStep() {
  if (state.step < STEPS.length) { state.step++; saveState(); renderPlan(); }
}

function openProgModal() {
  let html = '';
  let lastEtap = 0;
  STEPS.forEach(st => {
    if (st.etap !== lastEtap) {
      if (lastEtap > 0) html += '</div>';
      html += `<div class="step-sep">ETAP ${st.etap} — L=${st.L}kg / H=${st.H}kg</div><div>`;
      lastEtap = st.etap;
    }
    const isCur = st.step === state.step;
    const dur = approxMin(st.intRounds);
    html += `<div class="step-item ${isCur?'active':''}" onclick="setStep(${st.step})">
      <div class="step-num">${st.step}</div>
      <div class="step-info">

      </div>

    </div>`;
  });

  document.getElementById('modal-prog').classList.add('open');
}

function setStep(n) {
  state.step = n; saveState();
  closeModal('modal-prog');

}

// TIMER
// ═══════════════════════════════════════════════════════════
let tCfg = { work:60, rest:30, rounds:4 };
let tSt = { running:false, phase:'work', remaining:60, round:1, iv:null, finished:false };
let tQueue = [];   // array of exercises to do
let tQueueIdx = 0; // current exercise index
let tLabel = null;

function buildQueue(dayKey) {
  const day = WEEK.find(d=>d.key===dayKey);
  // Only interval exercises (not TGU — that uses sets, not timer)
  return day.exercises
    .filter(e => e.fmt === 'interval')
    .map(e => {
      const key = getExKey(e);
      const es = key ? exStep(key) : curStep();
      return {
        name: e.name,
        rounds: es.intRounds,
        sub: `${kg(e.w,e.squat,key)}kg (${e.w})  ·  ${es.intRounds} rund  ·  ${tCfg.work}s / ${tCfg.rest}s`,
      };
    });
}

function launchTimer(dayKey) {
  tQueue = buildQueue(dayKey);
  tQueueIdx = 0;
  showScreen('timer');
  loadQueueItem(0);
}

function loadQueueItem(idx) {
  if (idx >= tQueue.length) return;
  const ex = tQueue[idx];
  tCfg.rounds = ex.rounds;
  tLabel = { name: ex.name, sub: ex.sub, idx: idx+1, total: tQueue.length };
  resetTimer();
}

function updateTimerUI() {
  const total = tSt.phase==='work' ? tCfg.work : tCfg.rest;
  const pct = tSt.remaining / total;
  const circ = 2*Math.PI*88;
  const prog = document.getElementById('timer-prog');
  prog.style.strokeDashoffset = circ*(1-pct);
  prog.style.stroke = tSt.phase==='work' ? 'var(--accent)' : 'var(--accent2)';
  const s = tSt.remaining;
  document.getElementById('timer-display').textContent =
    s >= 60 ? Math.floor(s/60)+':'+String(s%60).padStart(2,'0') : String(s).padStart(2,'0');
  document.getElementById('timer-round-info').textContent = 'RUNDA '+tSt.round+' / '+tCfg.rounds;
  const ph = document.getElementById('timer-phase');

  if (tSt.finished) {
    const hasNext = tQueueIdx + 1 < tQueue.length;
    if (hasNext) {
      ph.textContent = 'NASTĘPNE ĆWICZENIE';
      ph.className = 'timer-phase done';
      document.getElementById('timer-toggle-btn').textContent = 'DALEJ';
    } else {
      ph.textContent = 'KONIEC TRENINGU!';
      ph.className = 'timer-phase done';
      document.getElementById('timer-toggle-btn').textContent = 'RESET';
    }
  } else if (!tSt.running && tSt.remaining===total) {
    ph.textContent='GOTOWY'; ph.className='timer-phase ready';
    document.getElementById('timer-toggle-btn').textContent = 'START';
  } else {
    ph.textContent=tSt.phase==='work'?'PRACA':'ODPOCZYNEK';
    ph.className='timer-phase '+tSt.phase;
    document.getElementById('timer-toggle-btn').textContent = tSt.running?'PAUSE':'START';
  }

  // ex info
  const info = document.getElementById('timer-ex-info');
  if (tLabel) {
    info.style.display='block';
    document.getElementById('timer-ex-name').textContent =
      tLabel.name + (tLabel.total > 1 ? `  ${tLabel.idx}/${tLabel.total}` : '');
    document.getElementById('timer-ex-sub').textContent = tLabel.sub;
  } else { info.style.display='none'; }
}

function updateSettingsUI() {
  document.getElementById('work-val').textContent=tCfg.work+'s';
  document.getElementById('rest-val').textContent=tCfg.rest+'s';
  document.getElementById('rounds-val').textContent=tCfg.rounds;
}

function toggleTimer() {
  if (tSt.finished) {
    const hasNext = tQueueIdx + 1 < tQueue.length;
    if (hasNext) {
      tQueueIdx++;
      loadQueueItem(tQueueIdx);
    } else {
      tQueueIdx = 0;
      loadQueueItem(0);
    }
    return;
  }
  tSt.running ? pauseTimer() : startTick();
}

function startTick() {
  tSt.running=true;
  tSt.iv = setInterval(()=>{ tSt.remaining--; if(tSt.remaining<=0) nextPhase(); updateTimerUI(); },1000);
  updateTimerUI();
}

function pauseTimer() { tSt.running=false; clearInterval(tSt.iv); updateTimerUI(); }

function resetTimer() {
  pauseTimer();
  tSt={running:false,phase:'work',remaining:tCfg.work,round:1,iv:null,finished:false};
  updateTimerUI(); updateSettingsUI();
}

function skipPhase() { if(!tSt.finished) { tSt.remaining=1; } }

function nextPhase() {
  if (tSt.phase==='work') {
    tSt.phase='rest'; tSt.remaining=tCfg.rest; beep(440,.15);
  } else {
    tSt.round++;
    if (tSt.round>tCfg.rounds) { pauseTimer(); tSt.finished=true; beep(880,.3); setTimeout(()=>beep(1100,.3),220); return; }
    tSt.phase='work'; tSt.remaining=tCfg.work; beep(880,.2);
  }
}

function adjustSetting(key,delta) {
  if(key==='rounds') tCfg.rounds=Math.max(1,tCfg.rounds+delta);
  else tCfg[key]=Math.max(5,tCfg[key]+delta);
  if(!tSt.running&&!tSt.finished) tSt.remaining=tCfg[tSt.phase==='work'?'work':'rest'];
  updateSettingsUI(); updateTimerUI();
}

function beep(freq,vol) {
  try {
    const ctx=new(window.AudioContext||window.webkitAudioContext)();
    const o=ctx.createOscillator(),g=ctx.createGain();
    o.connect(g);g.connect(ctx.destination);
    o.frequency.value=freq;g.gain.value=vol;
    o.start();o.stop(ctx.currentTime+.15);
  } catch(e){}
}

// Local timezone date string (YYYY-MM-DD) — avoids UTC shift
function localDateStr(date) {
  const y = date.getFullYear();
  const m = String(date.getMonth()+1).padStart(2,'0');
  const d = String(date.getDate()).padStart(2,'0');
  return `${y}-${m}-${d}`;
}

function renderCalendar() {
  const MONTHS=['STYCZEŃ','LUTY','MARZEC','KWIECIEŃ','MAJ','CZERWIEC','LIPIEC','SIERPIEŃ','WRZESIEŃ','PAŹDZIERNIK','LISTOPAD','GRUDZIEŃ'];
  const DAY_KEYS=['sun','mon','tue','wed','thu','fri','sat'];
  const todayStr = localDateStr(new Date());
  const sess=state.sessions;
  const done=Object.values(sess).filter(s=>s.status==='done').length;
  const skip=Object.values(sess).filter(s=>s.status==='skipped').length;
  const total=done+skip;
  const pct=total>0?Math.round(done/total*100):0;

  // Build calendar grid
  const firstDay=new Date(calYear,calMonth,1);
  const lastDay=new Date(calYear,calMonth+1,0);
  const startDow=(firstDay.getDay()+6)%7;
  let calCells='';
  ['PN','WT','ŚR','CZ','PT','SB','ND'].forEach(d=>calCells+=`<div class="cal-dow">${d}</div>`);
  for(let i=0;i<startDow;i++) calCells+=`<div class="cal-day other"></div>`;
  for(let d=1;d<=lastDay.getDate();d++){
    const date=new Date(calYear,calMonth,d);
    const ds=localDateStr(date);
    const dk=DAY_KEYS[date.getDay()];
    const isTrain=WEEK.find(w=>w.key===dk)?.type==='train';
    const s=sess[ds];
    const isToday=ds===todayStr;
    let cls='cal-day';
    if(isToday) cls+=' today';
    if(s?.status==='done') cls+=' done';
    else if(s?.status==='skipped') cls+=' skipped';
    else if(isTrain) cls+=' train';
    const dot=(isTrain||s)?'<div class="cal-dot"></div>':'';
    calCells+=`<div class="${cls}" onclick="openLogModal('${ds}','${dk}')">${d}${dot}</div>`;
  }

  // History list
  const DAY_LBL={mon:'Poniedziałek',tue:'Wtorek',wed:'Środa',thu:'Czwartek',fri:'Piątek',sat:'Sobota',sun:'Niedziela'};
  const DAY_PLAN={mon:'Swing L + TGU H',tue:'C&P H + Squat L',thu:'Swing H + TGU L',fri:'C&P L + Squat H'};
  const entries=Object.entries(sess).sort((a,b)=>b[0].localeCompare(a[0])).slice(0,30);
  // Friday report for current week
  const fridayReport = (() => {
    const sug = analyzeSuggestion();
    if (!sug || sug.total < 2) return '';
    const col = sug.action==='up'?'var(--accent2)':sug.action==='down'?'var(--accent3)':'var(--accent)';
    const bg  = sug.action==='up'?'rgba(71,255,212,.06)':sug.action==='down'?'rgba(255,107,71,.06)':'rgba(232,255,71,.04)';
    return `<div style="background:${bg};border:2px solid ${col};border-radius:10px;padding:14px 16px;margin-bottom:16px;cursor:pointer" onclick="showWeeklySuggestion()">
      <div style="font-family:'DM Mono',monospace;font-size:10px;color:${col};letter-spacing:2px;text-transform:uppercase;margin-bottom:4px">📊 Raport tygodnia · ${sug.total} ocen</div>
      <div style="font-size:13px;font-weight:600;margin-bottom:2px">${sug.title}</div>
      <div style="font-size:11px;color:var(--muted);font-family:'DM Mono',monospace">Kliknij żeby zobaczyć szczegóły i sugestię →</div>
    </div>`;
  })();

  const RPE_EMOJI = { easy:'😊', good:'💪', hard:'🔥' };
  const RPE_LABEL = { easy:'lekko', good:'ok', hard:'ciężko' };

  let histHtml = entries.length ? entries.map(([ds,s])=>{
    const [y,m,d]=ds.split('-');
    const hasRPE = s.rpe && Object.keys(s.rpe).length > 0;
    const isTrain = DAY_EXERCISES[s.dayKey];
    const rpeHtml = hasRPE
      ? `<div style="font-size:11px;color:var(--muted);font-family:'DM Mono',monospace;margin-top:4px;line-height:1.6">
          ${Object.entries(s.rpe).map(([ex,v])=>v?`${RPE_EMOJI[v]} ${ex}: ${RPE_LABEL[v]}`:'').filter(Boolean).join('&nbsp;·&nbsp;')}
        </div>`
      : '';
    const rpeBtn = (s.status==='done' && isTrain)
      ? `<button onclick="event.stopPropagation();openRPEModal('${ds}','${s.dayKey}')"
          style="padding:5px 10px;background:none;border:1px solid ${hasRPE?'var(--accent)':'var(--border)'};
          color:${hasRPE?'var(--accent)':'var(--muted)'};border-radius:5px;font-size:10px;
          font-family:'DM Mono',monospace;cursor:pointer;letter-spacing:1px;white-space:nowrap;flex-shrink:0">
          ${hasRPE?'✎ ANKIETA':'+ ANKIETA'}
        </button>`
      : '';
    return `<div class="history-item" style="align-items:flex-start;flex-wrap:wrap;gap:8px">
      <div class="history-date" style="padding-top:2px">${d}.${m}.${y}</div>
      <div class="history-info">
        <div class="history-title">${DAY_LBL[s.dayKey]||s.dayKey}</div>
        <div class="history-sub">${DAY_PLAN[s.dayKey]||'—'}</div>
        ${rpeHtml}
      </div>
      <div style="display:flex;flex-direction:column;align-items:flex-end;gap:6px">
        <div class="history-status ${s.status==='done'?'status-done':'status-skip'}">${s.status==='done'?'✓ WYKONANE':'✗ POMINIĘTE'}</div>
        ${rpeBtn}
      </div>
    </div>`;
  }).join('') : `<div class="empty-state">BRAK HISTORII<br>ZACZNIJ TRENOWAĆ</div>`;

  document.getElementById('screen-calendar').innerHTML = `
    <div class="screen-title">KALENDARZ</div>
    <div class="screen-sub">HISTORIA SESJI</div>
    <div class="stats-grid">
      <div class="stat-card"><div class="stat-val">${done}</div><div class="stat-label">Wykonane</div></div>
      <div class="stat-card"><div class="stat-val">${pct}%</div><div class="stat-label">Skuteczność</div></div>
      <div class="stat-card"><div class="stat-val">${skip}</div><div class="stat-label">Pominięte</div></div>
      <div class="stat-card"><div class="stat-val">${total}</div><div class="stat-label">Łącznie</div></div>
    </div>
    <div class="cal-header">
      <button class="cal-nav" onclick="calPrev()">‹</button>
      <div class="cal-month">${MONTHS[calMonth]} ${calYear}</div>
      <button class="cal-nav" onclick="calNext()">›</button>
    </div>
    <div class="cal-legend">
      <div class="cal-legend-item"><div class="cal-legend-dot" style="background:var(--accent2)"></div>WYKONANE</div>
      <div class="cal-legend-item"><div class="cal-legend-dot" style="background:var(--accent3)"></div>POMINIĘTE</div>
      <div class="cal-legend-item"><div class="cal-legend-dot" style="background:var(--border)"></div>ZAPLANOWANE</div>
    </div>
    <div class="cal-grid">${calCells}</div>
    <div style="font-family:'DM Mono',monospace;font-size:10px;color:var(--muted);letter-spacing:1px;text-transform:uppercase;margin-bottom:12px;margin-top:8px">Progres</div>
    <div id="charts-section"></div>
    <div style="font-family:'DM Mono',monospace;font-size:10px;color:var(--muted);letter-spacing:1px;text-transform:uppercase;margin-bottom:12px;margin-top:20px">Historia</div>
    ${fridayReport}
    ${histHtml}`;
  setTimeout(() => renderCharts(), 0);
}

function calPrev(){calMonth--;if(calMonth<0){calMonth=11;calYear--;}renderCalendar();}
function calNext(){calMonth++;if(calMonth>11){calMonth=0;calYear++;}renderCalendar();}

function openLogModal(ds, dk) {
  pendingLogDate = ds; pendingLogDayKey = dk;
  const DAY_LBL = {mon:'Poniedziałek',tue:'Wtorek',wed:'Środa',thu:'Czwartek',fri:'Piątek',sat:'Sobota',sun:'Niedziela'};
  const [y,m,d] = ds.split('-');
  document.getElementById('modal-log-title').textContent = DAY_LBL[dk] || dk;
  document.getElementById('modal-log-sub').textContent = `${d}.${m}.${y}`;
  // Highlight active status
  const existing = state.sessions[ds]?.status;
  document.getElementById('modal-log-done').style.opacity    = existing === 'done'    ? '1' : '0.45';
  document.getElementById('modal-log-skipped').style.opacity = existing === 'skipped' ? '1' : '0.45';
  document.getElementById('modal-log').classList.add('open');
}

function toggleSession(status) {
  if (!pendingLogDate) return;
  const existing = state.sessions[pendingLogDate]?.status;
  if (existing === status) {
    // Same button clicked again — remove
    delete state.sessions[pendingLogDate];
  } else {
    // New status — save snapshot
    const snapshot = {};
    ['swing','squat','cp','tgu'].forEach(key => {
      const s = exStep(key);
      snapshot[key] = {
        step: s.step,
        kg: key==='squat' ? { L: s.SL, H: s.SH } : { L: s.L, H: s.H },
        rounds: s.intRounds,
        tguSets: s.tguSets,
      };
    });
    const prevRpe = state.sessions[pendingLogDate]?.rpe || {};
    state.sessions[pendingLogDate] = { dayKey: pendingLogDayKey, status, snapshot, rpe: prevRpe };
  }
  saveState();
  closeModal('modal-log');
  renderCalendar();
  // Open RPE for training days marked done
  if (state.sessions[pendingLogDate]?.status === 'done' && DAY_EXERCISES[pendingLogDayKey]) {
    setTimeout(() => openRPEModal(pendingLogDate, pendingLogDayKey), 300);
  }
}

function submitRPE() {

  if (state.sessions[rpeSessionKey]) {

    saveState();

// ─── WEEKLY SUGGESTION LOGIC ──────────────────────────────
function getWeekRPEs() {
  // Get current ISO week key
  const today = new Date();
  const weekKey = getISOWeek(today);

  // Find Mon-Fri of current week
  const ratings = []; // flat list of all RPE values this week
  const perEx = {}; // { exName: [values] }

  Object.entries(state.sessions).forEach(([ds, s]) => {
    if (!s.rpe || s.status !== 'done') return;
    // Check if this date is in current week
    const d = new Date(ds + 'T12:00:00');
    if (getISOWeek(d) !== weekKey) return;
    Object.entries(s.rpe).forEach(([ex, val]) => {
      if (!val) return;
      ratings.push(val);
      if (!perEx[ex]) perEx[ex] = [];
      perEx[ex].push(val);
    });
  });

  return { ratings, perEx, total: ratings.length };
}

function analyzeSuggestion() {
  const { ratings, perEx, total } = getWeekRPEs();
  if (total === 0) return null;

  const easy = ratings.filter(r => r === 'easy').length;
  const good = ratings.filter(r => r === 'good').length;
  const hard = ratings.filter(r => r === 'hard').length;

  let action, title, detail, cls;

  if (hard >= 2) {
    action = 'down';
    title = '↓ ROZWAŻ COFNIĘCIE KROKU';
    cls = 'sug-down';
    detail = `${hard} z ${total} ćwiczeń było za ciężkich. Twoje ciało sygnalizuje że potrzebuje więcej czasu na adaptację. Zostań na tym kroku jeszcze tydzień lub cofnij się o jeden krok.`;
  } else if (easy >= 3) {
    action = 'up';
    title = '↑ CZAS NA PROGRESJĘ';
    cls = 'sug-up';
    detail = `${easy} z ${total} ćwiczeń było za lekkich. Twoje ciało jest gotowe na więcej. Możesz przejść do następnego kroku.`;
  } else {
    action = 'stay';
    title = '✓ JESTEŚ W IDEALNYM MIEJSCU';
    cls = 'sug-stay';
    detail = `${good} z ${total} ćwiczeń było w sam raz${easy > 0 ? `, ${easy} za lekkich` : ''}${hard > 0 ? `, ${hard} za ciężkich` : ''}. Kontynuuj aktualny krok — progres idzie dobrze.`;
  }

  // Per-exercise breakdown
  const breakdown = Object.entries(perEx).map(([ex, vals]) => {
    const e = vals.filter(v=>v==='easy').length;
    const g = vals.filter(v=>v==='good').length;
    const h = vals.filter(v=>v==='hard').length;
    const emoji = h > 0 ? '🔥' : e === vals.length ? '😊' : '💪';
    return `${emoji} ${ex}: ${vals.map(v=>v==='easy'?'lekko':v==='good'?'ok':'ciężko').join(', ')}`;
  }).join('<br>');

  return { action, title, detail, cls, breakdown, easy, good, hard, total };
}

function showWeeklySuggestion() {
  const sug = analyzeSuggestion();
  if (!sug) return;

  const nextStep = STEPS[state.step] || null; // step after current
  const prevStep = state.step > 1 ? STEPS[state.step - 2] : null;

  let actionBtns = '';
  if (sug.action === 'up' && nextStep) {
    actionBtns = `<button class="modal-btn primary" onclick="nextStep();closeModal('modal-suggestion')">↑ Przejdź do kroku ${nextStep.step}</button>`;
  } else if (sug.action === 'down' && prevStep) {
    actionBtns = `<button class="modal-btn danger" onclick="prevStep();closeModal('modal-suggestion')">↓ Cofnij do kroku ${prevStep.step}</button>`;
  }
  actionBtns += `<button class="modal-btn secondary" onclick="closeModal('modal-suggestion')">Zostań na kroku ${state.step}</button>`;

  document.getElementById('suggestion-content').innerHTML = `
    <div class="suggestion-card ${sug.cls}">
      <div class="sug-title" style="color:${sug.action==='up'?'var(--accent2)':sug.action==='down'?'var(--accent3)':'var(--accent)'}">${sug.title}</div>
      <div class="sug-detail">${sug.detail}</div>
      <div style="font-family:'DM Mono',monospace;font-size:11px;color:var(--muted);line-height:1.8">${sug.breakdown}</div>
    </div>
    ${actionBtns}`;

  document.getElementById('modal-suggestion').classList.add('open');
}

function prevStep() {
  if (state.step > 1) { state.step--; saveState(); renderPlan(); }
}

// Show suggestion button on plan if has week data (whole week, not just Friday)
function getSuggestionBanner() {
  const sug = analyzeSuggestion();
  if (!sug || sug.total < 2) return '';
  const col = sug.action==='up'?'var(--accent2)':sug.action==='down'?'var(--accent3)':'var(--accent)';
  const bg  = sug.action==='up'?'rgba(71,255,212,.06)':sug.action==='down'?'rgba(255,107,71,.06)':'rgba(232,255,71,.04)';
  return `<div style="background:${bg};border:1px solid ${col};border-radius:10px;padding:12px 16px;margin-bottom:16px;cursor:pointer" onclick="showWeeklySuggestion()">
    <div style="font-family:'DM Mono',monospace;font-size:10px;color:${col};letter-spacing:2px;text-transform:uppercase;margin-bottom:4px">Raport tygodnia · ${sug.total} ocen ↓ kliknij aby rozwinąć</div>
    <div style="font-size:13px;font-weight:600">${sug.title} →</div>
  </div>`;
}

// ═══════════════════════════════════════════════════════════
// CHARTS — dwie linie: Ciężar (kg) + Rundy
// ═══════════════════════════════════════════════════════════
let activeChartEx = 'swing';

const EX_COLORS = { swing:'#e8ff47', squat:'#47ffd4', cp:'#ff6b47', tgu:'#a78bfa' };
const EX_LABELS_CHART = { swing:'Swing', squat:'Squat', cp:'Clean & Press', tgu:'TGU' };
const EX_DAYS = { swing:['mon','thu'], tgu:['mon','thu'], cp:['tue','fri'], squat:['tue','fri'] };
const COLOR_ENDURANCE = '#888';

function getChartData(exKey, type) {
  const days = EX_DAYS[exKey] || [];
  const points = [];
  Object.entries(state.sessions)
    .filter(([,s]) => s.status==='done' && days.includes(s.dayKey))
    .sort((a,b) => a[0].localeCompare(b[0]))
    .forEach(([ds, s]) => {
      const [y,m,d] = ds.split('-');
      const label = d+'.'+m;
      const snap = s.snapshot ? s.snapshot[exKey] : null;
      if (type === 'strength') {
        const kgL = snap ? snap.kg.L : (exKey==='squat' ? curStep().SL : curStep().L);
        const kgH = snap ? snap.kg.H : (exKey==='squat' ? curStep().SH : curStep().H);
        points.push({ label, val: Math.round((kgL+kgH)/2*10)/10 });
      } else {
        const val = snap
          ? (exKey==='tgu' ? snap.tguSets : snap.rounds)
          : (exKey==='tgu' ? curStep().tguSets : curStep().intRounds);
        points.push({ label, val });
      }
    });
  return points;
}

function drawDualChart(canvasId, ptS, colS, ptE, colE) {
  const canvas = document.getElementById(canvasId);
  if (!canvas) return;
  const W = canvas.parentElement ? canvas.parentElement.clientWidth : 320;
  const H = 170;
  canvas.width = W; canvas.height = H;
  const ctx = canvas.getContext('2d');
  ctx.clearRect(0,0,W,H);

  if (!ptS.length && !ptE.length) {
    ctx.fillStyle='#555'; ctx.font='12px monospace'; ctx.textAlign='center';
    ctx.fillText('Brak danych — zaloguj sesje jako wykonane', W/2, H/2); return;
  }

  const allLabels = [...new Set([...ptS.map(p=>p.label),...ptE.map(p=>p.label)])].sort();
  const pad = {t:18,r:34,b:26,l:34};
  const cW = W-pad.l-pad.r, cH = H-pad.t-pad.b;

  // Y ranges
  const vS = ptS.map(p=>p.val), vE = ptE.map(p=>p.val);
  const minS = vS.length?Math.min(...vS):0, maxS = vS.length?Math.max(...vS):1;
  const minE = vE.length?Math.min(...vE):0, maxE = vE.length?Math.max(...vE):1;
  const rS = maxS-minS||1, rE = maxE-minE||1;

  // Grid
  ctx.lineWidth=1; ctx.strokeStyle='#2a2a2a';
  for (let i=0;i<=4;i++) {
    const y = pad.t+cH-(i/4)*cH;
    ctx.beginPath(); ctx.moveTo(pad.l,y); ctx.lineTo(pad.l+cW,y); ctx.stroke();
    // left axis (kg)
    if (vS.length) {
      const v = minS+(i/4)*rS;
      ctx.fillStyle=colS+'bb'; ctx.font='9px monospace'; ctx.textAlign='right';
      ctx.fillText(Number.isInteger(v)?v:v.toFixed(1), pad.l-4, y+3);
    }
    // right axis (rundy)
    if (vE.length) {
      const v = minE+(i/4)*rE;
      ctx.fillStyle=colE+'bb'; ctx.font='9px monospace'; ctx.textAlign='left';
      ctx.fillText(Math.round(v), W-pad.r+4, y+3);
    }
  }

  function xPos(lbl) {
    const idx = allLabels.indexOf(lbl);
    return allLabels.length===1 ? pad.l+cW/2 : pad.l+(idx/(allLabels.length-1))*cW;
  }

  function drawLine(pts, col, minV, rangeV) {
    if (!pts.length) return;
    const coords = pts.map(p=>({ x:xPos(p.label), y:pad.t+cH-((p.val-minV)/rangeV)*cH }));

    if (coords.length>1) {
      // Area
      ctx.beginPath(); ctx.moveTo(coords[0].x, pad.t+cH);
      coords.forEach(c=>ctx.lineTo(c.x,c.y));
      ctx.lineTo(coords[coords.length-1].x, pad.t+cH); ctx.closePath();
      const gr = ctx.createLinearGradient(0,pad.t,0,pad.t+cH);
      gr.addColorStop(0,col+'28'); gr.addColorStop(1,col+'00');
      ctx.fillStyle=gr; ctx.fill();
      // Line
      ctx.beginPath(); ctx.strokeStyle=col; ctx.lineWidth=2; ctx.lineJoin='round';
      coords.forEach((c,i)=>i===0?ctx.moveTo(c.x,c.y):ctx.lineTo(c.x,c.y));
      ctx.stroke();
    }

    // Dots + values
    coords.forEach((c,i)=>{
      ctx.beginPath(); ctx.arc(c.x,c.y,3.5,0,Math.PI*2);
      ctx.fillStyle=col; ctx.fill();
      ctx.fillStyle=col; ctx.font='bold 9px monospace'; ctx.textAlign='center';
      ctx.fillText(pts[i].val, c.x, c.y-7);
    });
  }

  drawLine(ptS, colS, minS, rS);
  drawLine(ptE, colE, minE, rE);

  // X labels
  allLabels.forEach((lbl,i)=>{
    if (i===0||i===allLabels.length-1||allLabels.length<=8) {
      ctx.fillStyle='#555'; ctx.font='9px monospace'; ctx.textAlign='center';
      ctx.fillText(lbl, xPos(lbl), H-4);
    }
  });
}

function renderCharts() {
  const el = document.getElementById('charts-section');
  if (!el) return;

  const col = EX_COLORS[activeChartEx];
  const exTabs = Object.entries(EX_LABELS_CHART).map(([k,v]) =>
    `<button class="chart-tab ${k===activeChartEx?'active':''}"
      onclick="setChartEx('${k}')"
      style="${k===activeChartEx?`border-color:${EX_COLORS[k]};color:${EX_COLORS[k]};background:${EX_COLORS[k]}11`:''}"
    >${v}</button>`
  ).join('');

  const ptS = getChartData(activeChartEx,'strength');
  const ptE = getChartData(activeChartEx,'endurance');
  const lastS = ptS[ptS.length-1];
  const lastE = ptE[ptE.length-1];
  const n = ptS.length;

  el.innerHTML = `
    <div class="chart-wrap">
      <div class="chart-title">PROGRES</div>
      <div class="chart-tabs">${exTabs}</div>
      <div style="display:flex;gap:16px;margin-bottom:10px;flex-wrap:wrap;align-items:flex-end">
        ${lastS?`<div>
          <div style="font-size:10px;color:var(--muted);font-family:'DM Mono',monospace;letter-spacing:1px">CIĘŻAR (śr.)</div>
          <div style="font-family:'Bebas Neue',sans-serif;font-size:26px;color:${col};line-height:1">${lastS.val} kg</div>
        </div>`:''}
        ${lastE?`<div>
          <div style="font-size:10px;color:var(--muted);font-family:'DM Mono',monospace;letter-spacing:1px">RUNDY</div>
          <div style="font-family:'Bebas Neue',sans-serif;font-size:26px;color:#aaa;line-height:1">${lastE.val}</div>
        </div>`:''}
        <div>
          <div style="font-size:10px;color:var(--muted);font-family:'DM Mono',monospace;letter-spacing:1px">SESJI</div>
          <div style="font-family:'Bebas Neue',sans-serif;font-size:26px;color:var(--text);line-height:1">${n}</div>
        </div>
      </div>
      <div class="chart-legend">
        <div class="chart-legend-item"><div class="chart-legend-dot" style="background:${col}"></div>Ciężar kg (lewa oś)</div>
        <div class="chart-legend-item"><div class="chart-legend-dot" style="background:#888"></div>Rundy (prawa oś)</div>
      </div>
      <canvas id="chart-canvas" style="display:block;width:100%"></canvas>
    </div>`;

  setTimeout(()=>drawDualChart('chart-canvas',ptS,col,ptE,COLOR_ENDURANCE), 50);
}

function setChartEx(key) { activeChartEx=key; renderCharts(); }
